name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Type check (sdk)
        run: npx tsc --noEmit
        working-directory: packages/sdk

      - name: Type check (sdk-nextjs)
        run: npx tsc --noEmit
        working-directory: packages/sdk-nextjs

      - name: Unit tests
        run: npm test --workspaces --if-present

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Contract tests
        run: npm run test:contract
        working-directory: packages/sdk
        env:
          # Run the generated channel contract tests, not just REST — they
          # drive a real @archastro/channel-harness subprocess over
          # WebSocket + HTTP so we catch protocol regressions in CI.
          ARCHASTRO_RUN_CHANNEL_CONTRACT_TESTS: "1"
